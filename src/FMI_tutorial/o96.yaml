defaults:
- data: zarr
- dataloader: native_grid
- diagnostics: evaluation_ens
- system: slurm
- graph: multi_scale
- model: graphtransformer_ens
- training: ensemble
- _self_

config_validation: False

diagnostics:
  log:
    mlflow:
      enabled: True
      offline: True
      tracking_uri: None
      experiment_name: 'o96'

system:
  input:
    graph: /leonardo_work/EUHPC_R06_263/hhaugen/multi_scale_refiner/graphs/o96.pt
    dataset: /leonardo_work/DestE_340_25/ai-ml/datasets/aifs-ea-an-oper-0001-mars-o96-1979-2023-6h-v8.zarr
    dataset_sfc: /leonardo_work/DestE_340_25/ai-ml/datasets/aifs-ea-an-oper-0001-mars-o96-1979-2023-6h-v3-land.zarr
    truncation: null
    truncation_inv: null
    loss_matrices_path: null
  output: 
    root: /leonardo_work/EUHPC_R06_263/hhaugen/multi_scale_refiner/output/
  hardware:
    accelerator: auto
    num_gpus_per_ensemble: 4  # ensemble parallelism
    num_gpus_per_model: 2     # model sharding

graph: 
  overwrite: False
  
dataloader:
  dataset:
    join:
      - dataset: ${system.input.dataset}
      - dataset: ${system.input.dataset_sfc}
    adjust: ["start", "end"]
    select: ${selected_vars}
    reorder: sort

  read_group_size: ${system.hardware.num_gpus_per_model}

  batch_size:
    training: 1
    validation: 1
    test: 1
  limit_batches:
    training: null
    validation: null
  training: 
    datasets:
      data:
        start: 1979-01-01
        end: 2021-12-31
  
  validation:
    datasets:
      data:
        start: 2022-01-01
        end: 2022-12-31

  test:
    datasets:
      data:
        start: 2022-01-01
        end: 2022-12-31

model:
  num_channels: 1024
  bounding:
  - _target_: anemoi.models.layers.bounding.ReluBounding
    variables:
    - tp
    - tcw
    - ssrd
    - q_50
    - q_100
    - q_150
    - q_200
    - q_250
    - q_300
    - q_400
    - q_500
    - q_700
    - q_850
    - q_925
    - q_1000
  - _target_: anemoi.models.layers.bounding.HardtanhBounding
    variables:
    - tcc
    min_val: 0
    max_val: 1
  - _target_: anemoi.models.layers.bounding.FractionBounding
    variables:
    - lcc
    - mcc
    - hcc
    min_val: 0
    max_val: 1
    total_var: tcc

  trainable_parameters:
    data: 0
    hidden: 0
    data2hidden: 0
    hidden2hidden: 0
    hidden2data: 0
  processor:
    num_chunks: 4
  encoder:
    num_chunks: 4
  decoder:
    num_chunks: 4

data:
  datasets:
    data:
      forcing:
        - lsm
        - z
        - insolation
        - cos_latitude
        - cos_longitude
        - sin_latitude
        - sin_longitude
        - cos_julian_day
        - cos_local_time
        - sin_julian_day
        - sin_local_time
      diagnostic: [tp, ssrd, strd]
      processors:
        normalizer:
          _target_: anemoi.models.preprocessing.normalizer.InputNormalizer
          config:
            default: mean-std
            std:
              - tp
              - tcw
              - ssrd
              - q_50
              - q_100
              - q_150
              - q_200
              - q_250
              - q_300
              - q_400
              - q_500
              - q_700
              - q_850
              - q_925
              - q_1000
            min-max:
            max:
            none:
              - cos_latitude
              - cos_longitude
              - sin_latitude
              - sin_longitude
              - cos_julian_day
              - cos_local_time
              - sin_julian_day
              - sin_local_time
              - insolation
              - lsm
              - tcc
              - mcc
              - hcc
              - lcc
training:
  lr:
    warmup: 1000
    rate: 6.25e-5
    iterations: ${training.max_steps}
    min: 0
  ensemble_size_per_device: 1
  max_steps: 150000

  run_id: null
  
  metrics:
    datasets:
      data:
        - t_500
        - t_850
        - u_500
        - u_850
        - v_500
        - v_850
  scalers:
    datasets:
      data:
        general_variable:
          _target_: anemoi.training.losses.scalers.GeneralVariableLossScaler
          weights:
            default: 1
            q: 0.6
            t: 6
            u: 0.8
            v: 0.5
            w: 0.001
            z: 12
            sp: 10
            10u: 0.1
            10v: 0.1
            2d: 0.5
            tp: 0.025
            ssrd: 0.05
            strd: 0.1
            tcc: 0.1
            mcc: 0.1
            hcc: 0.1
            lcc: 0.1
                 
  



selected_vars: ['10u', '10v', '2d', '2t', 'cos_julian_day', 'cos_latitude', 'cos_local_time', 'cos_longitude', 'hcc', 'insolation', 'lcc', 'lsm', 'mcc', 'msl', 'q_100', 'q_1000', 'q_150', 'q_200', 'q_250', 'q_300', 'q_400', 'q_50', 'q_500', 'q_700', 'q_850', 'q_925', 'sin_julian_day', 'sin_latitude', 'sin_local_time', 'sin_longitude', 'skt', 'sp', 'ssrd', 'strd', 't_100', 't_1000', 't_150', 't_200', 't_250', 't_300', 't_400', 't_50', 't_500', 't_700', 't_850', 't_925', 'tcc', 'tcw', 'tp', 'u_100', 'u_1000', 'u_150', 'u_200', 'u_250', 'u_300', 'u_400', 'u_50', 'u_500', 'u_700', 'u_850', 'u_925', 'v_100', 'v_1000', 'v_150', 'v_200', 'v_250', 'v_300', 'v_400', 'v_50', 'v_500', 'v_700', 'v_850', 'v_925', 'w_100', 'w_1000', 'w_150', 'w_200', 'w_250', 'w_300', 'w_400', 'w_50', 'w_500', 'w_700', 'w_850', 'w_925', 'z', 'z_100', 'z_1000', 'z_150', 'z_200', 'z_250', 'z_300', 'z_400', 'z_50', 'z_500', 'z_700', 'z_850', 'z_925']
